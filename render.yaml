# Render.com 部署配置
# 免费Web Service - 沉鱼AI畅聊助手后端

services:
  # 主后端服务 (Flask + GLM-4)
  - type: web
    name: cyaihub-backend
    runtime: python
    plan: free
    
    # 构建配置
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    
    # 环境变量 (在Dashboard中设置更安全)
    envVars:
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: "3.12"
    
    # 持久化目录 (数据库+上传文件)
    disk:
      name: data-disk
      mountPath: /opt/render/.cache/data
      sizeGB: 1
    
    # 自动部署设置
    branch: main
    healthCheckPath: /api/health
    
    # 区域 (推荐离用户近的)
    region: singapore  # 亚太区域，延迟低
