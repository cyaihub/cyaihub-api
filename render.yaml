services:
  - type: web
    name: cyaihub-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    plan: free
    autoDeploy: true
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: ZHIPU_API_KEY
        sync: false
      - key: AI_PRIMARY_MODEL
        value: glm-4-plus
      - key: AI_FALLBACK_MODEL
        value: glm-4-flash
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_PATH
        value: /app/data/app.db
